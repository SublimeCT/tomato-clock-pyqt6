name: Build and Upload Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYINSTALLER_STRICT_COLLECT_MODE: 1

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python with uv
        run: uv python install 3.13

      - name: Install Dependencies
        run: uv sync --dev

      - name: Build macOS release
        run: |
          chmod +x scripts/build_macos_release.sh
          ./scripts/build_macos_release.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist/*.dmg
            dist/*.dmg.sha256

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python with uv
        run: uv python install 3.13

      - name: Install Dependencies
        run: uv sync --dev

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows release
        shell: pwsh
        run: .\scripts\build_windows_installer.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/*-Windows.exe
            dist/*-Windows.exe.sha256

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python with uv
        run: uv python install 3.13

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 appstream libxcb-cursor0 libxcb-icccm4

      - name: Install Dependencies
        run: uv sync --dev

      - name: Build Linux release
        run: |
          chmod +x scripts/build_linux_appimage.sh packaging/linux/AppRun
          ./scripts/build_linux_appimage.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/*.AppImage
            dist/*.AppImage.sha256

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-macos
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
